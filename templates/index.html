<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animal Identifier</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:white;
    width:90%;
    max-width:700px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    color:#333;
    margin-bottom:20px;
}

.upload-box{
    border:2px dashed #4facfe;
    padding:25px;
    border-radius:15px;
    margin-bottom:20px;
}

input[type=file]{
    margin-top:10px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#4facfe;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#2196f3;
}

.result{
    margin-top:25px;
}

.result img{
    width:300px;
    max-width:100%;
    border-radius:15px;
    margin-top:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.animal{
    color:#2196f3;
    font-size:28px;
    margin-top:10px;
}

.confidence{
    font-size:20px;
    color:green;
    margin-top:10px;
}

.info{
    margin-top:15px;
    color:#555;
    line-height:1.6;
}

.footer{
    margin-top:25px;
    color:gray;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

    <h1>🦁 Animal Identifier Using AI</h1>

    <form action="/predict" method="POST" enctype="multipart/form-data">

        <div class="upload-box">
            <h3>Select an Animal Image</h3>
            <input type="file" name="image" required>
        </div>

        <button type="submit">
            Identify Animal
        </button>

    </form>

    {% if animal %}

    <div class="result">

        <h2 class="animal">
            {{ animal|capitalize }}
        </h2>

        <div class="confidence">
            Confidence: {{ confidence }}%
        </div>

        <img src="{{ image_path }}" alt="Animal">

        <p class="info">
            {{ info }}
        </p>

    </div>

    {% endif %}

    <div class="footer">
        Animal Identification System using Deep Learning
    </div>

</div>

</body>
</html>
